# ==================== KAFKA КОНФИГУРАЦИЯ ====================

# Адреса брокеров Kafka (разделенные запятыми)
kafka.bootstrap.servers=kafka:9092

# ==================== KAFKA ТОПИКИ ====================

# Названия топиков для различных типов уведомлений
kafka.user.registration.topic=notifications.registration.events
kafka.user.reset.password.topic=notifications.reset.password.events

# ==================== MONGODB КОНФИГУРАЦИЯ ====================

# Строка подключения к MongoDB
mongodb.connection.string=mongodb://<login>:<pass>@mongodb:27017/bankx-notification?authSource=admin

# Название базы данных
mongodb.database=bankx-notification

# ==================== EMAIL КОНФИГУРАЦИЯ ====================

# SMTP сервер для отправки почты
email.smtp.host=smtp.mail.ru

# Порт SMTP сервера
email.smtp.port=465

# Имя пользователя для аутентификации на SMTP сервере
email.smtp.username=login@mail.ru

# Пароль для аутентификации на SMTP сервере
email.smtp.password=password

# Email адрес отправителя
email.from.address=login@mail.ru

# ==================== APPLICATION HOST ====================

# Базовый URL приложения для формирования ссылок в уведомлениях
# Может быть изменен для разных окружений (dev, prod, и т.д.)
app.host=http://localhost:8083