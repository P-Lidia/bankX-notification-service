services:
  mongodb:
    image: mongo:latest
    container_name: bankx-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - bankx-network

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: bankx-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bankx-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: bankx-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - bankx-network

  wildfly:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: bankx-wildfly
    ports:
      - "8080:8080"
      - "9990:9990"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
    depends_on:
      - mongodb
      - kafka
    networks:
      - bankx-network

volumes:
  mongodb_data:

networks:
  bankx-network:
    driver: bridge