# Kafka Configuration
kafka.bootstrap.servers=kafka:9092
kafka.payment.topic=payment-events
kafka.user.topic=user-events

# MongoDB Configuration
mongodb.connection.string=mongodb://mongodb:27017/notificationdb
mongodb.database=notificationdb

# Email Configuration
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.username=your-email@gmail.com
email.smtp.password=your-password

# Application Settings
notification.retry.attempts=3
notification.retry.delay=5000